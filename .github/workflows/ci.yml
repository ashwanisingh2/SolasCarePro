name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: windows-latest
    name: Lint + Unit Tests

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint (ESLint)
        run: npm run lint

      - name: Unit tests (Vitest)
        run: npm test

  vite-build:
    runs-on: windows-latest
    name: Vite Production Build
    needs: lint-and-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build renderer (production)
        run: npm run vite:build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: renderer-dist
          path: dist/
          retention-days: 7
